name: Publish to npm
on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: docker compose up -d
      - run: ./tests/ci/wait-for-metabase.sh
      - run: bun test
      - run: docker compose down
        if: always()

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install
      - run: bun run build
      - run: npm publish --provenance --access public
